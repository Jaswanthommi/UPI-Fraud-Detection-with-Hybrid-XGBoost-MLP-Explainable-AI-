{% extends 'base.html' %}
{% block title %}Predict • UPI Fraud Detection{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <h2 class="section-title">Transaction Risk Prediction</h2>
    <div class="card">
      <form class="form-grid" action="{{ url_for('predict') }}" method="post">
        <div class="form-field">
          <label for="txn_type">Transaction Type</label>
          <select id="txn_type" name="txn_type">
            <option value="P2P">P2P</option>
            <option value="P2M">P2M</option>
            <option value="P2A">P2A</option>
          </select>
        </div>
        <div class="form-field">
          <label for="txn_amount">Amount (₹)</label>
          <input id="txn_amount" name="txn_amount" type="number" step="0.01" min="0" value="1000">
        </div>
        <div class="form-field">
          <label for="day_of_week">Day of Week</label>
          <select id="day_of_week" name="day_of_week">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
            <option>Saturday</option>
            <option>Sunday</option>
          </select>
        </div>
        <div class="form-field">
          <label for="hour_of_day">Hour of Day (0-23)</label>
          <input id="hour_of_day" name="hour_of_day" type="number" min="0" max="23" value="14">
        </div>
        <div class="form-field">
          <label for="device_change_flag">Device Change</label>
          <select id="device_change_flag" name="device_change_flag">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="form-field">
          <label for="geo_distance_from_home">Geo Distance from Home (km)</label>
          <input id="geo_distance_from_home" name="geo_distance_from_home" type="number" step="0.1" min="0" value="5.0">
        </div>
        <div class="form-field">
          <label for="avg_daily_txn_amt">Avg Daily Amount (₹)</label>
          <input id="avg_daily_txn_amt" name="avg_daily_txn_amt" type="number" step="0.01" min="0" value="1200">
        </div>
        <div class="form-field">
          <label for="txn_frequency_day">Txn Frequency (per day)</label>
          <input id="txn_frequency_day" name="txn_frequency_day" type="number" min="0" value="8">
        </div>
        <div class="form-field">
          <label for="failed_txn_ratio_7d">Failed Txn Ratio (7d)</label>
          <input id="failed_txn_ratio_7d" name="failed_txn_ratio_7d" type="number" step="0.01" min="0" max="1" value="0.05">
        </div>
        <div class="form-field">
          <label for="suspicious_merchant_flag">Suspicious Merchant</label>
          <select id="suspicious_merchant_flag" name="suspicious_merchant_flag">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="form-field">
          <label for="upi_app_used">UPI App Used</label>
          <select id="upi_app_used" name="upi_app_used">
            <option>GooglePay</option>
            <option>PhonePe</option>
            <option>Paytm</option>
            <option>BHIM</option>
          </select>
        </div>
        <div class="form-field">
          <label for="txn_channel">Transaction Channel</label>
          <select id="txn_channel" name="txn_channel">
            <option>Mobile</option>
            <option>Web</option>
            <option>USSD</option>
          </select>
        </div>
        <div class="form-field">
          <label for="is_night_txn">Night Transaction</label>
          <select id="is_night_txn" name="is_night_txn">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="form-field">
          <label for="account_age_days">Account Age (days)</label>
          <input id="account_age_days" name="account_age_days" type="number" min="0" value="365">
        </div>
        <div class="form-field span-2">
          <label for="fraud_probability_score">User Risk Signal (0-1)</label>
          <input id="fraud_probability_score" name="fraud_probability_score" type="number" step="0.01" min="0" max="1" value="0.2">
        </div>
        <div class="form-actions span-2">
          <button class="btn btn-primary" type="submit">Predict Now</button>
          <a class="btn btn-ghost" href="{{ url_for('home') }}">Back to Home</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
